name: BoursePilot Morning Report

on:
  schedule:
    - cron: "30 5 * * 1-5"
  workflow_dispatch:

jobs:
  morning-report:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run BoursePilot
        run: |
          python app.py
